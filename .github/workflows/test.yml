name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Cache Alire toolchain and packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('alire.toml') }}
          restore-keys: |
            alire-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update -o Acquire::Languages=none && sudo apt-get install -y --no-install-recommends libsqlite3-dev gnat

      - name: Build
        run: alr build

      - name: Verify binaries
        run: test -x bin/sdata && test -x bin/csv_unit_test && test -x bin/sdata_unit_test

      - name: Run test suite
        run: alr exec -- make check

      - name: Run GNATcheck
        run: alr exec -- make gnatcheck

      - name: Fuzz corpus regression
        run: alr exec -- make fuzz-corpus
