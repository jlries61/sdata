name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Fetch dependencies and build
        run: alr build

      - name: Run test suite
        run: alr exec -- make check
