name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sdata
        uses: actions/checkout@v5
        with:
          path: sdata

      # sdata depends on sdata-core via an Alire path pin (see sdata/alire.toml).
      # Check it out as a sibling so '../sdata-core' resolves from sdata's
      # working directory.  Once sdata-core publishes to the Alire community
      # index, this step can be removed and the path pin replaced with a
      # plain version dependency.
      - name: Checkout sdata-core
        uses: actions/checkout@v5
        with:
          repository: jlries61/sdata-core
          ref: main
          path: sdata-core

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Cache Alire toolchain and packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/alire
          key: alire-${{ runner.os }}-${{ hashFiles('sdata/alire.toml', 'sdata-core/alire.toml') }}
          restore-keys: |
            alire-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get update -o Acquire::Languages=none && sudo apt-get install -y --no-install-recommends libsqlite3-dev

      - name: Build
        working-directory: sdata
        run: alr build

      - name: Verify binaries
        working-directory: sdata
        run: test -x bin/sdata && test -x bin/csv_unit_test && test -x bin/sdata_unit_test

      - name: Run test suite
        working-directory: sdata
        run: alr exec -- make check

      - name: Fuzz corpus regression
        working-directory: sdata
        run: alr exec -- make fuzz-corpus

      - name: Cache gnatmetric (libadalang_tools)
        uses: actions/cache@v4
        with:
          path: sdata/tools
          key: gnatmetric-${{ runner.os }}-libadalang_tools-26.0.0

      - name: Complexity gate (gnatmetric)
        working-directory: sdata
        run: make complexity-check
